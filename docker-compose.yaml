services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todocamisetas_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      db:
        condition: service_healthy
    networks:
      - todocamisetas_net

  nginx:
    image: nginx:alpine
    container_name: todocamisetas_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - todocamisetas_net

  db:
    image: mysql:8.0
    container_name: todocamisetas_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: todocamisetas
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
    networks:
      - todocamisetas_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: todocamisetas_pma
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: laravel
      PMA_PASSWORD: secret
    depends_on:
      - db
    networks:
      - todocamisetas_net

volumes:
  db_data:

networks:
  todocamisetas_net:
    driver: bridge
